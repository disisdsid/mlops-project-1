# -----------------------------
# Namespace
# -----------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: mlops

---
# -----------------------------
# ConfigMap (optional configs)
# -----------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: house-price-config
  namespace: mlops
data:
  APP_ENV: "production"

---
# -----------------------------
# Deployment
# -----------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: house-price-deployment
  namespace: mlops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: house-price
  template:
    metadata:
      labels:
        app: house-price
    spec:
      containers:
      - name: house-price-container
        image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/house-price-api:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: house-price-config
              key: APP_ENV

        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"

        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15

---
# -----------------------------
# Service (AWS LoadBalancer)
# -----------------------------
apiVersion: v1
kind: Service
metadata:
  name: house-price-service
  namespace: mlops
spec:
  type: LoadBalancer
  selector:
    app: house-price
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000

---
# -----------------------------
# Horizontal Pod Autoscaler
# -----------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: house-price-hpa
  namespace: mlops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: house-price-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
